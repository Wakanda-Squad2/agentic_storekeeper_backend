# Render Blueprint — deploy API + managed PostgreSQL.
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy: set OPENROUTER_API_KEY, ALLOWED_ORIGINS (e.g. ["https://storekeeper-andela.vercel.app"]), and REDIS_URL
# in the Render dashboard (Environment). SECRET_KEY is generated below unless you override.

databases:
  - name: storekeeper-db
    databaseName: storekeeper
    user: storekeeper
    region: oregon

services:
  - type: web
    name: storekeeper-api
    region: oregon
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # Ephemeral filesystem on free tier — uploads are lost on restart/deploy unless you add a paid disk or S3.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: storekeeper-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: WORKERS
        value: "1"
